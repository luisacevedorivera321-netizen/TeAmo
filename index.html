<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I love you Annette</title>
<style>
    body {
        margin: 0;
        padding: 0;
        background-color: #000000;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        width: 100vw;
        font-family: 'Times New Roman', Times, serif;
    }

    /* Fondo de Estrellas */
    #space {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
        pointer-events: none;
    }

    /* Contenedor Principal del Universo */
    .universe-container {
        position: relative;
        width: 1000px;
        height: 500px;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 2;
    }

    /* El Corazón de Neón con su Resplandor */
    .heart-glow {
        fill: #ff0055;
        stroke: #ff7799;
        stroke-width: 2px;
        /* Filtro de brillo de neón intenso */
        filter: drop-shadow(0 0 15px #ff0055) 
                drop-shadow(0 0 30px #ff0055) 
                drop-shadow(0 0 60px #ffaa00);
        animation: pulse 3s ease-in-out infinite alternate;
        transform-origin: center;
    }

    /* El Anillo Brillante (Acreción) */
    .cosmic-ring {
        fill: none;
        stroke: #ffaa00;
        stroke-width: 24px;
        stroke-linecap: round;
        opacity: 0.9;
        /* Filtro de resplandor naranja/dorado */
        filter: drop-shadow(0 0 10px #ffaa00) 
                drop-shadow(0 0 25px #ff5500);
    }

    /* Texto "I love you Annette" con estilo idéntico de la imagen */
    .love-text {
        font-family: 'Georgia', 'Times New Roman', serif;
        font-size: 52px;
        font-style: italic;
        font-weight: 500;
        fill: #ffffff;
        text-anchor: middle;
        dominant-baseline: middle;
        /* Sutil sombra para separarlo del fondo */
        filter: drop-shadow(0 2px 5px rgba(0,0,0,0.9));
    }

    /* Animación de latido sutil para darle vida al universo */
    @keyframes pulse {
        0% {
            transform: scale(0.98);
        }
        100% {
            transform: scale(1.02);
        }
    }
</style>
</head>
<body>

    <!-- Lienzo para las estrellas parpadeantes del espacio profundo -->
    <canvas id="space"></canvas>

    <!-- Contenedor del diseño central -->
    <div class="universe-container">
        <svg viewBox="0 0 1000 500" width="100%" height="100%">
            <!-- 1. PARTE TRASERA DEL ANILLO (Para que pase por detrás del corazón) -->
            <path class="cosmic-ring" d="M 150,250 Q 500,160 850,250" />

            <!-- 2. EL CORAZÓN CENTRADO -->
            <!-- Escalado y posicionado idéntico al medio del anillo -->
            <g transform="translate(500, 240) scale(4.8)">
                <path class="heart-glow" d="M 0, -15 
                           C -10,-30 -35,-25 -35,5 
                           C -35,25 -15,40 0,55 
                           C 15,40 35,25 35,5 
                           C 35,-25 10,-30 0,-15 Z" />
            </g>

            <!-- 3. PARTE DELANTERA DEL ANILLO (Para envolver el corazón por el frente) -->
            <path class="cosmic-ring" d="M 850,250 Q 500,340 150,250" />

            <!-- 4. EL TEXTO DE AMOR (Superpuesto en el centro absoluto) -->
            <text x="500" y="253" class="love-text">I love you Annette</text>
        </svg>
    </div>

<script>
    // Generador dinámico de estrellas de fondo (Efecto Galaxia Parpadeante)
    const canvas = document.getElementById('space');
    const ctx = canvas.getContext('2d');

    let stars = [];
    const numStars = 180;

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }

    function initStars() {
        stars = [];
        for (let i = 0; i < numStars; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.width,
                size: Math.random() * 1.8 + 0.2,
                // Algunas estrellas brillan más que otras creando destellos galácticos
                brightness: Math.random(),
                speed: Math.random() * 0.02 + 0.005
            });
        }
    }

    function drawStars() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#ffffff';

        stars.forEach(star => {
            // Animación del parpadeo (brillo senoidal)
            star.brightness += star.speed;
            let opacity = Math.abs(Math.sin(star.brightness));
            
            ctx.globalAlpha = opacity;
            ctx.beginPath();
            ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
            ctx.fill();
        });

        requestAnimationFrame(drawStars);
    }

    window.addEventListener('resize', () => {
        resizeCanvas();
        initStars();
    });

    // Iniciar el fondo espacial
    resizeCanvas();
    initStars();
    drawStars();
</script>

</body>
</html>
