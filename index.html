<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I love you Annette</title>
<style>
    body {
        margin: 0;
        padding: 0;
        background-color: #000000;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        width: 100vw;
        font-family: 'Times New Roman', Times, serif;
    }

    /* Fondo de Estrellas */
    #space {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
        pointer-events: none;
    }

    /* Contenedor Principal */
    .universe-container {
        position: relative;
        width: 100%;
        max-width: 1200px;
        height: 600px;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 2;
    }

    /* Forzamos a que el SVG no recorte ningún brillo exterior */
    svg {
        overflow: visible !important;
    }

    /* El Corazón de Neón con su Resplandor corregido */
    .heart-glow {
        fill: #ff0055;
        stroke: #ff7799;
        stroke-width: 2px;
        filter: url(#neon-glow-heart);
        animation: pulse 3s ease-in-out infinite alternate;
        transform-origin: center;
    }

    /* El Anillo Brillante */
    .cosmic-ring {
        fill: none;
        stroke: #ffaa00;
        stroke-width: 22px;
        stroke-linecap: round;
        opacity: 0.95;
        filter: url(#neon-glow-ring);
    }

    /* Texto "I love you Annette" */
    .love-text {
        font-family: 'Georgia', 'Times New Roman', serif;
        font-size: 54px;
        font-style: italic;
        font-weight: 500;
        fill: #ffffff;
        text-anchor: middle;
        dominant-baseline: middle;
        filter: drop-shadow(0 2px 8px rgba(0,0,0,0.9));
    }

    @keyframes pulse {
        0% { transform: scale(0.98); }
        100% { transform: scale(1.02); }
    }
</style>
</head>
<body>

    <!-- Fondo de estrellas galácticas -->
    <canvas id="space"></canvas>

    <div class="universe-container">
        <svg viewBox="0 0 1000 600" width="100%" height="100%">
            
            <!-- DEFINE FILTROS AVANZADOS PARA EVITAR EL CUADRO DE CORTE -->
            <defs>
                <!-- Filtro de brillo para el corazón -->
                <filter id="neon-glow-heart" x="-50%" y="-50%" width="200%" height="200%">
                    <feGaussianBlur stdDeviation="15" result="blur1" />
                    <feGaussianBlur stdDeviation="35" result="blur2" />
                    <feMerge>
                        <feMergeNode in="blur2" />
                        <feMergeNode in="blur1" />
                        <feMergeNode in="SourceGraphic" />
                    </feMerge>
                </filter>

                <!-- Filtro de brillo para el anillo -->
                <filter id="neon-glow-ring" x="-50%" y="-50%" width="200%" height="200%">
                    <feGaussianBlur stdDeviation="10" result="blur1" />
                    <feGaussianBlur stdDeviation="25" result="blur2" />
                    <feMerge>
                        <feMergeNode in="blur2" />
                        <feMergeNode in="blur1" />
                        <feMergeNode in="SourceGraphic" />
                    </feMerge>
                </filter>
            </defs>

            <!-- 1. TRASERA DEL ANILLO -->
            <path class="cosmic-ring" d="M 100,300 Q 500,190 900,300" />

            <!-- 2. CORAZÓN CENTRADO -->
            <g transform="translate(500, 290) scale(4.8)">
                <path class="heart-glow" d="M 0, -15 
                           C -10,-30 -35,-25 -35,5 
                           C -35,25 -15,40 0,55 
                           C 15,40 35,25 35,5 
                           C 35,-25 10,-30 0,-15 Z" />
            </g>

            <!-- 3. DELANTERA DEL ANILLO -->
            <path class="cosmic-ring" d="M 900,300 Q 500,410 100,300" />

            <!-- 4. TEXTO DE AMOR -->
            <text x="500" y="303" class="love-text">I love you Annette</text>
        </svg>
    </div>

<script>
    // Script de estrellas (se mantiene idéntico y fluido)
    const canvas = document.getElementById('space');
    const ctx = canvas.getContext('2d');
    let stars = [];
    const numStars = 180;

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }

    function initStars() {
        stars = [];
        for (let i = 0; i < numStars; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 1.8 + 0.2,
                brightness: Math.random(),
                speed: Math.random() * 0.02 + 0.005
            });
        }
    }

    function drawStars() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#ffffff';
        stars.forEach(star => {
            star.brightness += star.speed;
            let opacity = Math.abs(Math.sin(star.brightness));
            ctx.globalAlpha = opacity;
            ctx.beginPath();
            ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
            ctx.fill();
        });
        requestAnimationFrame(drawStars);
    }

    window.addEventListener('resize', () => {
        resizeCanvas();
        initStars();
    });

    resizeCanvas();
    initStars();
    drawStars();
</script>

</body>
</html>
