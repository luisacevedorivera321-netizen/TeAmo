<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I love you Annette</title>
<style>
    body {
        margin: 0;
        padding: 0;
        background-color: #000000;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        width: 100vw;
    }

    /* Fondo de Estrellas Masivo */
    #space {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
        pointer-events: none;
    }

    /* Contenedor Principal */
    .universe-container {
        position: relative;
        width: 1000px;
        height: 600px;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 2;
    }

    svg {
        overflow: visible !important;
        position: absolute;
        width: 100%;
        height: 100%;
    }

    /* Corazón Limpio (Sin efectos extraños) */
    .heart-glow {
        fill: #ff0055;
        stroke: #ff7799;
        stroke-width: 2px;
        animation: pulse 3s ease-in-out infinite alternate;
        transform-origin: center;
    }

    /* Anillo Cósmico Limpio */
    .cosmic-ring {
        fill: none;
        stroke: #ffaa00;
        stroke-width: 24px;
        stroke-linecap: round;
        opacity: 0.95;
    }

    /* Texto "I love you Annette" */
    .love-text {
        font-family: 'Georgia', 'Times New Roman', serif;
        font-size: 54px;
        font-style: italic;
        font-weight: 500;
        fill: #ffffff;
        text-anchor: middle;
        dominant-baseline: middle;
        filter: drop-shadow(0 2px 10px rgba(0,0,0,0.9));
    }

    /* Animación de latido */
    @keyframes pulse {
        0% { transform: scale(0.98); }
        100% { transform: scale(1.02); }
    }
</style>
</head>
<body>

    <!-- Fondo de estrellas multiplicado -->
    <canvas id="space"></canvas>

    <div class="universe-container">
        <svg viewBox="0 0 1000 600">
            
            <!-- 1. PARTE TRASERA DEL ANILLO -->
            <path class="cosmic-ring" d="M 100,300 Q 500,180 900,300" />

            <!-- 2. EL CORAZÓN -->
            <g transform="translate(500, 290) scale(4.8)">
                <path class="heart-glow" d="M 0, -15 
                           C -10,-30 -35,-25 -35,5 
                           C -35,25 -15,40 0,55 
                           C 15,40 35,25 35,5 
                           C 35,-25 10,-30 0,-15 Z" />
            </g>

            <!-- 3. PARTE DELANTERA DEL ANILLO -->
            <path class="cosmic-ring" d="M 900,300 Q 500,420 100,300" />

            <!-- 4. TEXTO DE AMOR -->
            <text x="500" y="303" class="love-text">I love you Annette</text>
        </svg>
    </div>

<script>
    // Sistema de estrellas densas
    const canvas = document.getElementById('space');
    const ctx = canvas.getContext('2d');
    let stars = [];
    const numStars = 600; // ¡Multiplicamos la cantidad de estrellas por completo!

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }

    function initStars() {
        stars = [];
        for (let i = 0; i < numStars; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2.2 + 0.3, // Tamaños más variados para dar profundidad
                brightness: Math.random(),
                speed: Math.random() * 0.015 + 0.003 // Parpadeos orgánicos
            });
        }
    }

    function drawStars() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#ffffff';
        stars.forEach(star => {
            star.brightness += star.speed;
            let opacity = Math.abs(Math.sin(star.brightness));
            ctx.globalAlpha = opacity;
            ctx.beginPath();
            ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
            ctx.fill();
        });
        requestAnimationFrame(drawStars);
    }

    window.addEventListener('resize', () => {
        resizeCanvas();
        initStars();
    });

    resizeCanvas();
    initStars();
    drawStars();
</script>

</body>
</html>
