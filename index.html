<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mini Universo</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:black;
}
canvas{
    display:block;
}
</style>

</head>
<body>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.167/build/three.module.js";

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
2000
);

camera.position.z = 120;

const renderer = new THREE.WebGLRenderer({
antialias:true
});

renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

//////////////////////////////////////////////////////
// ESTRELLAS
//////////////////////////////////////////////////////

const starsGeometry = new THREE.BufferGeometry();

const stars = [];

for(let i=0;i<10000;i++){

stars.push(

(Math.random()-0.5)*1800,
(Math.random()-0.5)*1800,
(Math.random()-0.5)*1800

);

}

starsGeometry.setAttribute(
'position',
new THREE.Float32BufferAttribute(stars,3)
);

const starsMaterial = new THREE.PointsMaterial({

color:0xffffff,
size:1

});

const starField = new THREE.Points(
starsGeometry,
starsMaterial
);

scene.add(starField);

//////////////////////////////////////////////////////
// AGUJERO NEGRO
//////////////////////////////////////////////////////

const blackHole = new THREE.Mesh(

new THREE.SphereGeometry(18,64,64),

new THREE.MeshBasicMaterial({
color:0x000000
})

);

scene.add(blackHole);

const ring = new THREE.Mesh(

new THREE.TorusGeometry(25,3,64,200),

new THREE.MeshBasicMaterial({

color:0xffaa00

})

);

ring.rotation.x=Math.PI/2;
scene.add(ring);

//////////////////////////////////////////////////////
// CORAZÓN
//////////////////////////////////////////////////////

const heartShape = new THREE.Shape();

heartShape.moveTo(0,0);

heartShape.bezierCurveTo(
0,0,
-5,-8,
-15,-8
);

heartShape.bezierCurveTo(
-35,-8,
-35,18,
-35,18
);

heartShape.bezierCurveTo(
-35,40,
-15,55,
0,70
);

heartShape.bezierCurveTo(
15,55,
35,40,
35,18
);

heartShape.bezierCurveTo(
35,18,
35,-8,
15,-8
);

heartShape.bezierCurveTo(
5,-8,
0,0,
0,0
);

const heart = new THREE.Mesh(

new THREE.ExtrudeGeometry(heartShape,{
depth:3,
bevelEnabled:false
}),

new THREE.MeshBasicMaterial({
color:0xff0055
})

);

heart.scale.set(.5,.5,.5);

heart.position.set(60,-20,0);

scene.add(heart);

//////////////////////////////////////////////////////
// ANIMACIÓN
//////////////////////////////////////////////////////

function animate(){

requestAnimationFrame(animate);

starField.rotation.y+=0.0003;

ring.rotation.z+=0.01;

heart.rotation.y+=0.01;

renderer.render(scene,camera);

}

animate();

window.addEventListener("resize",()=>{

camera.aspect=window.innerWidth/window.innerHeight;

camera.updateProjectionMatrix();

renderer.setSize(
window.innerWidth,
window.innerHeight
);

});

</script>

</body>
</html>
